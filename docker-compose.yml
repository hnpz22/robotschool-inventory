services:

  # ── PHP + Apache ──────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: robotschool_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - .:/var/www/html
      - php_logs:/var/log/php
    environment:
      APP_ENV:          ${APP_ENV:-production}
      APP_URL:          ${APP_URL:-http://localhost:8081}
      DB_HOST:          db
      DB_NAME:          ${DB_NAME:-robotschool_inventory}
      DB_USER:          ${DB_USER:-rsuser}
      DB_PASS:          ${DB_PASS}
      DB_CHARSET:       utf8mb4
      SESSION_TIMEOUT:  ${SESSION_TIMEOUT:-3600}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MS_CLIENT_ID:     ${MS_CLIENT_ID:-}
      MS_CLIENT_SECRET: ${MS_CLIENT_SECRET:-}
      MS_TENANT_ID:     ${MS_TENANT_ID:-}
      WOO_URL:              ${WOO_URL:-}
      WOO_CONSUMER_KEY:     ${WOO_CONSUMER_KEY:-}
      WOO_CONSUMER_SECRET:  ${WOO_CONSUMER_SECRET:-}
      WOO_WEBHOOK_SECRET:   ${WOO_WEBHOOK_SECRET:-}
      WOO_CAMPO_COLEGIO:    ${WOO_CAMPO_COLEGIO:-billing_colegio}
      MINIO_ENDPOINT:          ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_PUBLIC_URL:        ${MINIO_PUBLIC_URL:-}
      MINIO_ROOT_USER:         ${MINIO_ROOT_USER:-}
      MINIO_ROOT_PASSWORD:     ${MINIO_ROOT_PASSWORD:-}
      MINIO_BUCKET_ELEMENTOS:  ${MINIO_BUCKET_ELEMENTOS:-elementos}
      MINIO_BUCKET_COLEGIOS:   ${MINIO_BUCKET_COLEGIOS:-colegios}
      MINIO_BUCKET_CURSOS:     ${MINIO_BUCKET_CURSOS:-cursos}
      MINIO_BUCKET_KITS:       ${MINIO_BUCKET_KITS:-kits}
      MINIO_BUCKET_DESPACHOS:  ${MINIO_BUCKET_DESPACHOS:-despachos}
      MINIO_BUCKET_DOCUMENTOS: ${MINIO_BUCKET_DOCUMENTOS:-documentos}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - robotschool

  # ── MySQL 8 ───────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: robotschool_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE:      ${DB_NAME:-robotschool_inventory}
      MYSQL_USER:          ${DB_USER:-rsuser}
      MYSQL_PASSWORD:      ${DB_PASS}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${DB_PORT:-3308}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - robotschool

  # ── MinIO (Object Storage S3-compatible) ─────────────────────
  minio:
    image: minio/minio:latest
    container_name: robotschool_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-robotschool}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
      - ./scripts:/scripts:ro
    networks:
      - robotschool
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Nginx reverse proxy ───────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: robotschool_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - app
      - minio
    networks:
      - robotschool

  # ── phpMyAdmin ────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:5
    container_name: robotschool_pma
    restart: unless-stopped
    ports:
      - "${PMA_PORT:-8082}:80"
    environment:
      PMA_HOST:     db
      PMA_PORT:     3306
      PMA_USER:     root
      PMA_PASSWORD: ${DB_ROOT_PASS}
      UPLOAD_LIMIT: 64M
    depends_on:
      db:
        condition: service_healthy
    networks:
      - robotschool

volumes:
  mysql_data:
    driver: local
  php_logs:
    driver: local
  minio_data:
    driver: local

networks:
  robotschool:
    driver: bridge
