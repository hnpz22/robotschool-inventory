version: '3.9'

services:

  # ── PHP + Apache ──────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: robotschool_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - .:/var/www/html
      - php_logs:/var/log/php
    environment:
      APP_ENV:          ${APP_ENV:-production}
      APP_URL:          ${APP_URL:-http://localhost:8081}
      DB_HOST:          db
      DB_NAME:          ${DB_NAME:-robotschool_inventory}
      DB_USER:          ${DB_USER:-rsuser}
      DB_PASS:          ${DB_PASS}
      DB_CHARSET:       utf8mb4
      SESSION_TIMEOUT:  ${SESSION_TIMEOUT:-3600}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MS_CLIENT_ID:     ${MS_CLIENT_ID:-}
      MS_CLIENT_SECRET: ${MS_CLIENT_SECRET:-}
      MS_TENANT_ID:     ${MS_TENANT_ID:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - robotschool

  # ── MySQL 8 ───────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: robotschool_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE:      ${DB_NAME:-robotschool_inventory}
      MYSQL_USER:          ${DB_USER:-rsuser}
      MYSQL_PASSWORD:      ${DB_PASS}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - robotschool

  # ── phpMyAdmin ────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:5
    container_name: robotschool_pma
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST:     db
      PMA_PORT:     3306
      PMA_USER:     root
      PMA_PASSWORD: ${DB_ROOT_PASS}
      UPLOAD_LIMIT: 64M
    depends_on:
      db:
        condition: service_healthy
    networks:
      - robotschool

volumes:
  mysql_data:
    driver: local
  php_logs:
    driver: local

networks:
  robotschool:
    driver: bridge
