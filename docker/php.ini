; ── Errores ──
; display_errors se controla dinámicamente en config.php según APP_ENV
; Aquí forzamos el comportamiento base para producción
display_errors = Off
log_errors = On
error_log = /var/log/php/error.log
error_reporting = E_ALL

; ── Uploads ──
upload_max_filesize = 10M
post_max_size = 12M
max_file_uploads = 20

; ── Ejecución ──
max_execution_time = 60
memory_limit = 256M

; ── Sesión ──
session.cookie_httponly = 1
session.cookie_samesite = Lax
session.use_strict_mode = 1

; ── Zona horaria (también se setea en config.php) ──
date.timezone = America/Bogota
