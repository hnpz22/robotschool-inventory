# ── sistema.miel-robotschool.com → PHP/Apache app ─────────────────────────────
server {
    listen 80;
    server_name sistema.miel-robotschool.com;

    client_max_body_size 20M;

    location / {
        proxy_pass          http://app:80;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  120s;
    }
}

# ── archivos.miel-robotschool.com → MinIO API (buckets públicos) ───────────────
server {
    listen 80;
    server_name archivos.miel-robotschool.com;

    client_max_body_size 100M;

    location / {
        proxy_pass                http://minio:9000;
        proxy_set_header          Host              $http_host;
        proxy_set_header          X-Real-IP         $remote_addr;
        proxy_set_header          X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header          X-Forwarded-Proto $scheme;
        proxy_buffering           off;
        proxy_request_buffering   off;
        proxy_connect_timeout     300s;
        proxy_send_timeout        300s;
        proxy_read_timeout        300s;
        chunked_transfer_encoding on;
    }
}

# ── minio.miel-robotschool.com → MinIO consola admin ──────────────────────────
server {
    listen 80;
    server_name minio.miel-robotschool.com;

    client_max_body_size 100M;

    location / {
        proxy_pass          http://minio:9001;
        proxy_set_header    Host              $http_host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        "upgrade";
        proxy_read_timeout  900s;
    }
}
